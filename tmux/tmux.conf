# =============================================================================
# Tmux Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Core settings
# ---------------------------------------------------------------------------
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on
set -g allow-rename off
setw -g automatic-rename off

setw -g mode-keys vi

# ---------------------------------------------------------------------------
# Pane navigation (Alt+hjkl — no prefix needed)
# ---------------------------------------------------------------------------
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ---------------------------------------------------------------------------
# Directional splits (Alt+Shift+hjkl — no prefix needed)
# ---------------------------------------------------------------------------
bind -n M-H split-window -hb -c "#{pane_current_path}"  # split left
bind -n M-J split-window -v  -c "#{pane_current_path}"  # split down
bind -n M-K split-window -vb -c "#{pane_current_path}"  # split up
bind -n M-L split-window -h  -c "#{pane_current_path}"  # split right

# ---------------------------------------------------------------------------
# Pane borders
# ---------------------------------------------------------------------------
set -g pane-border-lines heavy
set -g pane-active-border-style "fg=magenta"
set -g pane-border-style "fg=#5c5c8a"

# ---------------------------------------------------------------------------
# Pane resizing (Ctrl+Alt+hjkl — no prefix needed)
# ---------------------------------------------------------------------------
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# ---------------------------------------------------------------------------
# Window management
# ---------------------------------------------------------------------------
bind c new-window
bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind w choose-tree -Zw
bind -n M-w display-popup -E -w 60% -h 40% -T " Open Workspace " "fish -ic tmux_open_workspace"
bind -n M-W display-popup -E -w 40% -h 3 -T " Create New Workspace " "fish -ic tmux_create_workspace"
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-< swap-window -t -1\; select-window -t -1
bind -n M-> swap-window -t +1\; select-window -t +1

# ---------------------------------------------------------------------------
# Window ↔ Pane workflow
# ---------------------------------------------------------------------------
bind ! break-pane            # send pane to its own hidden window
bind J choose-window "join-pane -s '%%'"  # pull a window back as a pane

# ---------------------------------------------------------------------------
# Copy mode (vi-style)
# ---------------------------------------------------------------------------
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'sainnhe/tmux-fzf'

# Catppuccin — flavor auto-detected from macOS appearance at startup
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -qx Dark" \
    'set -g @catppuccin_flavor "frappe"' \
    'set -g @catppuccin_flavor "latte"'

# Auto-switch theme when macOS appearance changes (via DEC mode 2031, fired by Ghostty/Kitty)
set-hook -g client-dark-theme  "run '~/.config/tmux/switch-theme.sh frappe'"
set-hook -g client-light-theme "run '~/.config/tmux/switch-theme.sh latte'"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Continuum — auto-save every 15 min
set -g @continuum-save-interval '15'

# ---------------------------------------------------------------------------
# Initialize TPM (keep at bottom)
# ---------------------------------------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'
