edge            top
lines           25
columns         110
hide_on_focus_loss  yes
# Let Escape dismiss the quick-access panel without exiting the shell.
kitty_override map=esc remote_control resize-os-window --action=hide --self
# "no" so that if the popup instance ever dies (e.g. shell exit), the next
# Cmd+Space relaunch shows the window immediately instead of starting hidden.
start_as_hidden     no
