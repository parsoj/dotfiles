# Dedicated config for the Cmd+Space launcher popup.
#
# Important: do not map Escape at the kitty layer here. Let fzf receive Esc so
# it can abort, the launcher script can exit, and the one-shot launcher popup
# can terminate/close cleanly.

edge            top
lines           25
columns         110
hide_on_focus_loss  yes
start_as_hidden     no
